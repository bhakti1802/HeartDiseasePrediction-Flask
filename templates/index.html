<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .2);
        }

        .left {
            width: 35%;
            background: #023e8a;
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left i {
            font-size: 80px;
            margin-bottom: 20px;
            color: #90e0ef;
        }

        .left h1 {
            margin-bottom: 15px;
        }

        .left p {
            line-height: 1.8;
        }

        .right {
            width: 65%;
            padding: 35px;
        }

        .title {
            text-align: center;
            color: #023e8a;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
        }

        input:focus {
            outline: none;
            border-color: #00b4d8;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #00b4d8;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #0077b6;
        }

        @media(max-width:900px) {
            .container {
                flex-direction: column;
            }

            .left,
            .right {
                width: 100%;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="left">
            <i class="fa-solid fa-heart-circle-check"></i>

            <h1>Heart Disease Prediction</h1>

            <p>
                Machine Learning based healthcare system that predicts
                the possibility of heart disease using patient medical data.
            </p>
        </div>

        <div class="right">

            <h2 class="title">Patient Details</h2>

            <form action="/predict" method="POST">

                <div class="form-grid">

                    <div class="input-box">
                        <label>Age</label>
                        <input type="number" name="age" required>
                    </div>

                    <div class="input-box">
                        <label>Sex (0=Female, 1=Male)</label>
                        <input type="number" name="sex" required>
                    </div>

                    <div class="input-box">
                        <label>Chest Pain Type</label>
                        <input type="number" name="cp" required>
                    </div>

                    <div class="input-box">
                        <label>Blood Pressure</label>
                        <input type="number" name="trestbps" required>
                    </div>

                    <div class="input-box">
                        <label>Cholesterol</label>
                        <input type="number" name="chol" required>
                    </div>

                    <div class="input-box">
                        <label>Fasting Blood Sugar</label>
                        <input type="number" name="fbs" required>
                    </div>

                    <div class="input-box">
                        <label>Rest ECG</label>
                        <input type="number" name="restecg" required>
                    </div>

                    <div class="input-box">
                        <label>Maximum Heart Rate</label>
                        <input type="number" name="thalach" required>
                    </div>

                    <div class="input-box">
                        <label>Exercise Angina</label>
                        <input type="number" name="exang" required>
                    </div>

                    <div class="input-box">
                        <label>Old Peak</label>
                        <input type="number" step="0.1" name="oldpeak" required>
                    </div>

                    <div class="input-box">
                        <label>Slope</label>
                        <input type="number" name="slope" required>
                    </div>

                    <div class="input-box">
                        <label>CA</label>
                        <input type="number" name="ca" required>
                    </div>

                    <div class="input-box">
                        <label>Thal</label>
                        <input type="number" name="thal" required>
                    </div>

                </div>

                <button type="submit">
                    <i class="fa-solid fa-stethoscope"></i>
                    Predict Result
                </button>

            </form>

        </div>

    </div>

</body>

</html>
